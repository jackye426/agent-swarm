id: T-003
title: Add GitHub Actions CI workflow

goal: >
  Ensure every push to main and every pull request targeting main is automatically
  typechecked, unit-tested, and schema-validated via GitHub Actions, so broken
  contracts or failing tests are caught before merge.

status: DRAFT

owner:
  product: Product Owner
  engineering: Engineering Owner

scope:
  in:
    - .github/workflows/ci.yml
    - tasks/T-003/evidence/ (evidence files documenting AC verification)
  out:
    - Any changes to src/, scripts/, or any file outside .github/ and tasks/T-003/evidence/
    - Changes to package.json, tsconfig.json, or existing configuration
    - New npm scripts or dependencies
    - tasks/T-003/contract.yaml (do not modify the contract itself)

dependencies: []

constraints:
  - Only .github/workflows/ci.yml and tasks/T-003/evidence/ may be created or modified
  - Do not edit tasks/T-003/contract.yaml
  - Workflow must use a publicly available GitHub Actions runner (ubuntu-latest)
  - Node.js version must be pinned to 20.x (LTS)
  - No secrets or environment variables beyond what is already in the repository

acceptance_criteria:
  - id: AC-1
    requirement: .github/workflows/ci.yml exists in the repository root.
    verification:
      - File presence check in PR diff

  - id: AC-2
    requirement: Workflow triggers on push to main and on pull_request targeting main.
    verification:
      - Inspect workflow on/push/branches and on/pull_request/branches fields in diff

  - id: AC-3
    requirement: Workflow installs dependencies with npm ci before running any checks.
    verification:
      - Inspect workflow steps in diff

  - id: AC-4
    requirement: Workflow runs npm run typecheck and fails the job on TypeScript errors.
    verification:
      - Inspect workflow steps in diff

  - id: AC-5
    requirement: Workflow runs npm test and fails the job on any failing unit test.
    verification:
      - Inspect workflow steps in diff

risks:
  - risk: Workflow file has a YAML syntax error and fails to parse on GitHub.
    mitigation: Validate the workflow YAML syntax locally before committing.

rollback:
  - Delete .github/workflows/ci.yml — the workflow is purely additive and can be
    removed without affecting any other code.

approvals_required:
  - Product
  - Engineering
