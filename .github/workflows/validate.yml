name: TaskGraph OS Validation

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  validate:
    name: Validate contracts and evidence
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Validate task contracts
        run: npm run validate:contracts

      - name: Validate evidence records
        run: npm run validate:evidence

      - name: Run tests
        run: npm test

  # Future job: upload CI evidence to Supabase
  # ci:
  #   name: Run tests and record CI evidence
  #   needs: validate
  #   ...
